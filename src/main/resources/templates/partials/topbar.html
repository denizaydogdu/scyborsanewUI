<html xmlns:th="http://www.thymeleaf.org">

<body>
	<div th:fragment="topbar" th:remove="tag">
		<header id="page-topbar">
			<div class="layout-width">
				<div class="navbar-header">
					<div class="d-flex">
						<!-- LOGO -->
						<div class="navbar-brand-box horizontal-logo">
							<a href="/dashboard" class="logo logo-dark">
								<span class="logo-sm">
									<img th:src="@{/assets/images/logo-sm.svg}" alt="" height="22">
								</span>
								<span class="logo-lg">
									<img th:src="@{/assets/images/logo-dark.svg}" alt="" height="28">
								</span>
							</a>

							<a href="/dashboard" class="logo logo-light">
								<span class="logo-sm">
									<img th:src="@{/assets/images/logo-sm.svg}" alt="" height="22">
								</span>
								<span class="logo-lg">
									<img th:src="@{/assets/images/logo-light.svg}" alt="" height="28">
								</span>
							</a>
						</div>

						<button type="button" class="btn btn-sm px-3 fs-16 header-item vertical-menu-btn topnav-hamburger" id="topnav-hamburger-icon">
							<span class="hamburger-icon">
								<span></span>
								<span></span>
								<span></span>
							</span>
						</button>

						<!-- App Search-->
						<form class="app-search d-none d-md-block" onsubmit="return false;">
							<div class="position-relative">
								<input type="text" class="form-control" placeholder="Hisse ara..." autocomplete="off" id="search-options" value="">
								<span class="mdi mdi-magnify search-widget-icon"></span>
								<span class="mdi mdi-close-circle search-widget-icon search-widget-icon-close d-none" id="search-close-options"></span>
								<!-- Hisse arama sonuc dropdown -->
								<div class="dropdown-menu p-0" id="search-dropdown" style="max-height:400px;overflow-y:auto;min-width:380px;"></div>
							</div>
						</form>
					</div>

					<div class="d-flex align-items-center">

						<!-- Takip Listesi Panel Toggle -->
						<div class="ms-1 header-item d-none d-sm-flex">
							<button type="button" class="btn btn-icon btn-topbar btn-ghost-secondary rounded-circle"
									id="watchlist-panel-toggle" title="Takip Listesi">
								<i class="ri-list-check fs-22"></i>
							</button>
						</div>

						<!-- Bildirimler (Fiyat Alarmlari) -->
						<div class="dropdown topbar-head-dropdown ms-1 header-item" id="notificationDropdown">
							<button type="button" class="btn btn-icon btn-topbar btn-ghost-secondary rounded-circle"
									id="page-header-notifications-dropdown" data-bs-toggle="dropdown" data-bs-auto-close="outside"
									aria-haspopup="true" aria-expanded="false">
								<i class="bx bx-bell fs-22"></i>
								<span class="position-absolute topbar-badge fs-10 translate-middle badge rounded-pill bg-danger"
									  id="notification-badge" style="display:none;">0</span>
							</button>
							<div class="dropdown-menu dropdown-menu-lg dropdown-menu-end p-0"
								 aria-labelledby="page-header-notifications-dropdown">
								<div class="dropdown-head bg-primary bg-pattern rounded-top">
									<div class="p-3">
										<div class="row align-items-center">
											<div class="col">
												<h6 class="m-0 fs-16 fw-semibold text-white">Bildirimler</h6>
											</div>
											<div class="col-auto">
												<a href="javascript:void(0);" id="mark-all-read"
												   class="badge bg-white-subtle text-white fs-13">
													Tümünü Okundu İşaretle</a>
											</div>
										</div>
									</div>
								</div>
								<div id="notification-list" class="p-2" style="max-height: 300px; overflow-y: auto;">
									<div class="text-center text-muted py-3" id="no-notifications">
										<i class="ri-notification-off-line fs-24 mb-2 d-block"></i>
										Bildirim yok
									</div>
								</div>
								<div class="p-2 border-top">
									<a href="/alarmlar" class="btn btn-sm btn-light w-100">
										Tüm Alarmları Görüntüle <i class="ri-arrow-right-s-line"></i>
									</a>
								</div>
							</div>
						</div>

						<div class="dropdown d-md-none topbar-head-dropdown header-item">
							<button type="button" class="btn btn-icon btn-topbar btn-ghost-secondary rounded-circle" id="page-header-search-dropdown" data-bs-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
								<i class="bx bx-search fs-22"></i>
							</button>
							<div class="dropdown-menu dropdown-menu-lg dropdown-menu-end p-0" aria-labelledby="page-header-search-dropdown">
								<form class="p-3" onsubmit="return false;">
									<div class="form-group m-0">
										<div class="input-group">
											<input type="text" class="form-control" placeholder="Hisse ara..." aria-label="Search" id="search-options-mobile">
											<button class="btn btn-primary" type="button"><i class="mdi mdi-magnify"></i></button>
										</div>
									</div>
									<!-- Mobil hisse arama sonuc dropdown -->
									<div class="list-group mt-2" id="search-results-dropdown-mobile" style="max-height:300px;overflow-y:auto;display:none;"></div>
								</form>
							</div>
						</div>

						<div class="ms-1 header-item d-none d-sm-flex">
							<button type="button" class="btn btn-icon btn-topbar btn-ghost-secondary rounded-circle" data-toggle="fullscreen">
								<i class='bx bx-fullscreen fs-22'></i>
							</button>
						</div>

						<div class="ms-1 header-item d-none d-sm-flex" style="display:none !important;">
							<button type="button" class="btn btn-icon btn-topbar btn-ghost-secondary rounded-circle light-dark-mode">
								<i class='bx bx-moon fs-22'></i>
							</button>
						</div>

						<div class="dropdown ms-sm-3 header-item topbar-user">
							<button type="button" class="btn" id="page-header-user-dropdown" data-bs-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
								<span class="d-flex align-items-center">
									<span class="rounded-circle header-profile-user d-flex align-items-center justify-content-center"
										  style="width:32px;height:32px;background:linear-gradient(135deg,#405189,#0ab39c);color:#fff;font-size:13px;font-weight:600;"
										  th:text="${session.userAdSoyad != null ? session.userAdSoyad.substring(0,1).toUpperCase() : 'U'}"></span>
									<span class="text-start ms-xl-2">
										<span class="d-none d-xl-inline-block ms-1 fw-medium user-name-text" th:text="${session.userAdSoyad ?: 'Kullanıcı'}">Kullanıcı</span>
										<span class="d-none d-xl-block ms-1 fs-12 text-muted user-name-sub-text" th:text="${session.userRole == 'ADMIN' ? 'Yönetici' : 'Kullanıcı'}">Yonetici</span>
									</span>
								</span>
							</button>
							<div class="dropdown-menu dropdown-menu-end">
								<h6 class="dropdown-header">Hoş Geldiniz!</h6>
								<a class="dropdown-item" href="/profil"><i class="mdi mdi-account-circle text-muted fs-16 align-middle me-1"></i> <span class="align-middle">Profil</span></a>
								<div class="dropdown-divider"></div>
								<form th:action="@{/logout}" method="post" class="d-inline">
									<button type="submit" class="dropdown-item">
										<i class="mdi mdi-logout text-muted fs-16 align-middle me-1"></i>
										<span class="align-middle">Çıkış</span>
									</button>
								</form>
							</div>
						</div>
					</div>
				</div>
			</div>
		</header>
	</div>
</body>

</html>
