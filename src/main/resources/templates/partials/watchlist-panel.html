<html xmlns:th="http://www.thymeleaf.org">

<body>
    <div th:fragment="watchlist-panel" th:remove="tag">
        <!-- Watchlist Sliding Panel -->
        <div id="watchlist-panel">
            <!-- Collapsed Strip (kapalıyken görünen ince şerit) -->
            <div id="wp-collapsed-strip">
                <div class="wp-strip-icon" title="Menü Aç/Kapat">
                    <i class="ri-menu-line"></i>
                </div>
                <div class="wp-strip-icon" title="Takip Listesi" style="margin-top:4px;">
                    <i class="ri-list-check"></i>
                </div>
            </div>

            <!-- Header -->
            <div class="watchlist-panel-header">
                <div class="d-flex align-items-center justify-content-between mb-2">
                    <h6 class="mb-0 fw-semibold">Takip Listesi</h6>
                    <button type="button" class="btn btn-icon btn-sm btn-ghost-secondary rounded-circle"
                            id="watchlist-panel-close" title="Kapat">
                        <i class="ri-close-line fs-18"></i>
                    </button>
                </div>
                <select id="wp-watchlist-select" class="form-select form-select-sm">
                    <option value="">Liste seçiniz...</option>
                </select>
                <div class="d-flex gap-1 mt-2">
                    <button type="button" class="btn btn-soft-primary btn-sm flex-fill" id="wp-new-list-btn">
                        <i class="ri-add-line align-bottom me-1"></i>Yeni
                    </button>
                    <button type="button" class="btn btn-soft-success btn-sm flex-fill" id="wp-add-stock-btn">
                        <i class="ri-add-circle-line align-bottom me-1"></i>Hisse Ekle
                    </button>
                </div>
            </div>

            <!-- Body -->
            <div class="watchlist-panel-body">
                <div id="wp-stock-list"></div>
            </div>

            <!-- Footer -->
            <div class="watchlist-panel-footer">
                <a th:href="@{/takip-listeleri}" class="text-primary fw-medium">
                    Tüm Listeyi Görüntüle <i class="ri-arrow-right-s-line align-bottom"></i>
                </a>
            </div>

        </div>

        <!-- Yeni Liste Modal (Bootstrap 5 popup) -->
        <div class="modal fade" id="wp-new-list-modal" tabindex="-1">
            <div class="modal-dialog modal-sm modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header py-2">
                        <h6 class="modal-title"><i class="ri-add-line me-1"></i> Yeni Takip Listesi</h6>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Kapat"></button>
                    </div>
                    <div class="modal-body py-3">
                        <div class="mb-2">
                            <label class="form-label fs-13">Liste Adı</label>
                            <input type="text" class="form-control form-control-sm" id="wp-new-list-name"
                                   placeholder="Örneğin: Teknoloji Hisseleri" maxlength="50" />
                        </div>
                        <div class="alert alert-danger mt-2 mb-0 py-1 px-2 fs-12 d-none" id="wp-new-list-error"></div>
                    </div>
                    <div class="modal-footer py-2">
                        <button type="button" class="btn btn-light btn-sm" data-bs-dismiss="modal">İptal</button>
                        <button type="button" class="btn btn-success btn-sm" id="wp-new-list-save">
                            <i class="ri-save-line me-1"></i> Oluştur
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Hisse Ekle Modal (Bootstrap 5 popup) -->
        <div class="modal fade" id="wp-add-stock-modal" tabindex="-1">
            <div class="modal-dialog modal-sm modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header py-2">
                        <h6 class="modal-title"><i class="ri-add-circle-line me-1"></i> Hisse Ekle</h6>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Kapat"></button>
                    </div>
                    <div class="modal-body py-3">
                        <div class="position-relative mb-2">
                            <input type="text" class="form-control form-control-sm" id="wp-add-stock-search"
                                   placeholder="Hisse kodu veya adı ara..." autocomplete="off" />
                            <div id="wp-add-stock-results" class="wp-search-results" style="display:none;"></div>
                        </div>
                        <div class="alert alert-success mt-2 mb-0 py-1 px-2 fs-12 d-none" id="wp-add-stock-success"></div>
                        <div class="alert alert-danger mt-2 mb-0 py-1 px-2 fs-12 d-none" id="wp-add-stock-error"></div>
                    </div>
                    <div class="modal-footer py-2">
                        <button type="button" class="btn btn-light btn-sm" data-bs-dismiss="modal">Kapat</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Mobile backdrop -->
        <div id="watchlist-panel-backdrop"></div>
    </div>
</body>

</html>
