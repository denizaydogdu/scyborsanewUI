<!doctype html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>
    <th:block layout:fragment="pagetitle">
        <div th:replace="~{partials/title-meta :: title-meta('Analist Yönetimi')}"></div>
    </th:block>
</head>

<body>
<section layout:fragment="content">
    <div th:replace="~{partials/page-title :: page-title('Analist Yönetimi', 'Yönetim')}"></div>

    <!-- Flash messages -->
    <div class="row" th:if="${successMsg}">
        <div class="col-12">
            <div class="alert alert-success alert-dismissible fade show" role="alert" th:text="${successMsg}"></div>
        </div>
    </div>
    <div class="row" th:if="${errorMsg}">
        <div class="col-12">
            <div class="alert alert-danger alert-dismissible fade show" role="alert" th:text="${errorMsg}"></div>
        </div>
    </div>

    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-header">
                    <div class="d-flex align-items-center">
                        <h5 class="card-title mb-0 flex-grow-1">Analistler</h5>
                        <button type="button" class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#addAnalistModal">
                            <i class="ri-add-line me-1"></i> Yeni Analist
                        </button>
                    </div>
                </div>
                <div class="card-body">
                    <!-- Empty state -->
                    <div th:if="${analistler == null or #lists.isEmpty(analistler)}" class="text-center py-5">
                        <i class="ri-user-star-line fs-1 text-muted"></i>
                        <h5 class="mt-3 text-muted">Henuz analist eklenmemis</h5>
                    </div>

                    <!-- Table -->
                    <div th:unless="${analistler == null or #lists.isEmpty(analistler)}" class="table-responsive">
                        <table class="table table-bordered table-nowrap align-middle mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>#</th>
                                    <th>Ad</th>
                                    <th>Unvan</th>
                                    <th>Oneri</th>
                                    <th>Kazanc</th>
                                    <th>Trend</th>
                                    <th>Sira</th>
                                    <th>Durum</th>
                                    <th>Islem</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="analist, iter : ${analistler}">
                                    <td th:text="${iter.count}">1</td>
                                    <td th:text="${analist.ad}">Ad</td>
                                    <td th:text="${analist.unvan}">Unvan</td>
                                    <td th:text="${analist.hisseOnerisi}">0</td>
                                    <td th:text="${analist.kazanc}">0</td>
                                    <td>
                                        <span th:if="${analist.trend}" class="badge bg-success-subtle text-success">Yukselis</span>
                                        <span th:unless="${analist.trend}" class="badge bg-danger-subtle text-danger">Dusus</span>
                                    </td>
                                    <td th:text="${analist.siraNo}">1</td>
                                    <td>
                                        <span th:if="${analist.aktif}" class="badge bg-success-subtle text-success">Aktif</span>
                                        <span th:unless="${analist.aktif}" class="badge bg-danger-subtle text-danger">Pasif</span>
                                    </td>
                                    <td>
                                        <div class="d-flex gap-1">
                                            <button type="button" class="btn btn-sm btn-soft-primary" data-bs-toggle="modal" data-bs-target="#editAnalistModal"
                                                    th:data-id="${analist.id}" th:data-ad="${analist.ad}" th:data-unvan="${analist.unvan}"
                                                    th:data-resimurl="${analist.resimUrl}" th:data-hisseonerisi="${analist.hisseOnerisi}"
                                                    th:data-kazanc="${analist.kazanc}" th:data-trend="${analist.trend}"
                                                    th:data-chartrenk="${analist.chartRenk}" th:data-chartverisi="${analist.chartVerisi}"
                                                    th:data-sirano="${analist.siraNo}">
                                                <i class="ri-pencil-line"></i>
                                            </button>
                                            <form th:unless="${analist.aktif}" th:action="@{'/backoffice/analistler/' + ${analist.id} + '/aktif'}" method="post" style="display:inline">
                                                <button type="submit" class="btn btn-sm btn-soft-success" title="Aktiflestir"><i class="ri-checkbox-circle-line"></i></button>
                                            </form>
                                            <form th:if="${analist.aktif}" th:action="@{'/backoffice/analistler/' + ${analist.id} + '/sil'}" method="post" style="display:inline"
                                                  onsubmit="return confirm('Bu analisti pasife almak istediginize emin misiniz?')">
                                                <button type="submit" class="btn btn-sm btn-soft-danger" title="Pasife Al"><i class="ri-close-circle-line"></i></button>
                                            </form>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

</section>

<th:block layout:fragment="modal">
    <!-- Ekle Modal -->
    <div class="modal fade" id="addAnalistModal" tabindex="-1" aria-labelledby="addAnalistModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <form th:action="@{/backoffice/analistler}" method="post">
                    <div class="modal-header">
                        <h5 class="modal-title" id="addAnalistModalLabel">Yeni Analist Ekle</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Kapat"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Ad</label>
                            <input type="text" name="ad" class="form-control" required placeholder="Analist adi">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Unvan</label>
                            <input type="text" name="unvan" class="form-control" placeholder="Unvan">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Resim URL</label>
                            <input type="text" name="resimUrl" class="form-control" placeholder="Resim URL">
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Hisse Onerisi</label>
                                <input type="number" name="hisseOnerisi" class="form-control" value="0">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Kazanc</label>
                                <input type="number" name="kazanc" class="form-control" value="0">
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Trend</label>
                                <select name="trend" class="form-select">
                                    <option value="true">Yukselis</option>
                                    <option value="false">Dusus</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Chart Renk</label>
                                <select name="chartRenk" class="form-select">
                                    <option value="success">Yesil (Success)</option>
                                    <option value="danger">Kirmizi (Danger)</option>
                                    <option value="warning">Sari (Warning)</option>
                                </select>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Chart Verisi</label>
                            <input type="text" name="chartVerisi" class="form-control" placeholder="Ornek: 10,25,13,30,22">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Sira No</label>
                            <input type="number" name="siraNo" class="form-control" value="1">
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-light" data-bs-dismiss="modal">Iptal</button>
                        <button type="submit" class="btn btn-primary">Kaydet</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Duzenle Modal -->
    <div class="modal fade" id="editAnalistModal" tabindex="-1" aria-labelledby="editAnalistModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <form id="editAnalistForm" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <div class="modal-header">
                        <h5 class="modal-title" id="editAnalistModalLabel">Analist Duzenle</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Kapat"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Ad</label>
                            <input type="text" name="ad" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Unvan</label>
                            <input type="text" name="unvan" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Resim URL</label>
                            <input type="text" name="resimUrl" class="form-control">
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Hisse Onerisi</label>
                                <input type="number" name="hisseOnerisi" class="form-control">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Kazanc</label>
                                <input type="number" name="kazanc" class="form-control">
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Trend</label>
                                <select name="trend" class="form-select">
                                    <option value="true">Yukselis</option>
                                    <option value="false">Dusus</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Chart Renk</label>
                                <select name="chartRenk" class="form-select">
                                    <option value="success">Yesil (Success)</option>
                                    <option value="danger">Kirmizi (Danger)</option>
                                    <option value="warning">Sari (Warning)</option>
                                </select>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Chart Verisi</label>
                            <input type="text" name="chartVerisi" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Sira No</label>
                            <input type="number" name="siraNo" class="form-control">
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-light" data-bs-dismiss="modal">Iptal</button>
                        <button type="submit" class="btn btn-primary">Guncelle</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</th:block>

<th:block layout:fragment="pagejs">
    <script>
        var editAnalistModal = document.getElementById('editAnalistModal');
        if (editAnalistModal) {
            editAnalistModal.addEventListener('show.bs.modal', function (event) {
                var btn = event.relatedTarget;
                var form = editAnalistModal.querySelector('form');
                form.action = '/backoffice/analistler/' + btn.getAttribute('data-id');
                form.querySelector('[name=ad]').value = btn.getAttribute('data-ad') || '';
                form.querySelector('[name=unvan]').value = btn.getAttribute('data-unvan') || '';
                form.querySelector('[name=resimUrl]').value = btn.getAttribute('data-resimurl') || '';
                form.querySelector('[name=hisseOnerisi]').value = btn.getAttribute('data-hisseonerisi') || '';
                form.querySelector('[name=kazanc]').value = btn.getAttribute('data-kazanc') || '';
                form.querySelector('[name=trend]').value = btn.getAttribute('data-trend') || 'true';
                form.querySelector('[name=chartRenk]').value = btn.getAttribute('data-chartrenk') || 'success';
                form.querySelector('[name=chartVerisi]').value = btn.getAttribute('data-chartverisi') || '';
                form.querySelector('[name=siraNo]').value = btn.getAttribute('data-sirano') || '';
            });
        }
    </script>
</th:block>
</body>

</html>
