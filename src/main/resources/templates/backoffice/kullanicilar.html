<!doctype html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>
    <th:block layout:fragment="pagetitle">
        <div th:replace="~{partials/title-meta :: title-meta('Kullanıcı Yönetimi')}"></div>
    </th:block>
</head>

<body>
<section layout:fragment="content">
    <div th:replace="~{partials/page-title :: page-title('Kullanıcı Yönetimi', 'Yönetim')}"></div>

    <!-- Flash messages -->
    <div class="row" th:if="${successMsg}">
        <div class="col-12">
            <div class="alert alert-success alert-dismissible fade show" role="alert">
                <span th:text="${successMsg}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Kapat"></button>
            </div>
        </div>
    </div>
    <div class="row" th:if="${errorMsg}">
        <div class="col-12">
            <div class="alert alert-danger alert-dismissible fade show" role="alert">
                <span th:text="${errorMsg}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Kapat"></button>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-header">
                    <div class="d-flex align-items-center">
                        <h5 class="card-title mb-0 flex-grow-1">Kullanıcılar</h5>
                        <button type="button" class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#addUserModal">
                            <i class="ri-add-line me-1"></i> Yeni Kullanıcı
                        </button>
                    </div>
                </div>
                <div class="card-body">
                    <!-- Empty state -->
                    <div th:if="${kullanicilar == null or #lists.isEmpty(kullanicilar)}" class="text-center py-5">
                        <i class="ri-user-line fs-1 text-muted"></i>
                        <h5 class="mt-3 text-muted">Henüz kullanıcı eklenmemiş</h5>
                    </div>

                    <!-- Table -->
                    <div th:unless="${kullanicilar == null or #lists.isEmpty(kullanicilar)}" class="table-responsive">
                        <table class="table table-bordered table-nowrap align-middle mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>#</th>
                                    <th>Kullanıcı Adı</th>
                                    <th>E-posta</th>
                                    <th>Ad Soyad</th>
                                    <th>Rol</th>
                                    <th>Geçerlilik Başlangıç</th>
                                    <th>Geçerlilik Bitiş</th>
                                    <th>Durum</th>
                                    <th>İşlem</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="user, iter : ${kullanicilar}">
                                    <td th:text="${iter.count}">1</td>
                                    <td th:text="${user.username != null ? user.username : '-'}">admin</td>
                                    <td th:text="${user.email != null ? user.email : '-'}">email@test.com</td>
                                    <td th:text="${user.adSoyad != null ? user.adSoyad : '-'}">Ad Soyad</td>
                                    <td>
                                        <span th:if="${user.role == 'ADMIN'}" class="badge bg-primary-subtle text-primary">ADMIN</span>
                                        <span th:unless="${user.role == 'ADMIN'}" class="badge bg-info-subtle text-info">USER</span>
                                    </td>
                                    <td th:text="${user.validFrom != null ? user.validFrom : '-'}">-</td>
                                    <td th:text="${user.validTo != null ? user.validTo : '-'}">-</td>
                                    <td>
                                        <span th:if="${user.aktif}" class="badge bg-success-subtle text-success">Aktif</span>
                                        <span th:unless="${user.aktif}" class="badge bg-danger-subtle text-danger">Pasif</span>
                                    </td>
                                    <td>
                                        <div class="d-flex gap-1">
                                            <button type="button" class="btn btn-sm btn-soft-primary" data-bs-toggle="modal" data-bs-target="#editUserModal"
                                                    th:data-id="${user.id}" th:data-username="${user.username}"
                                                    th:data-email="${user.email}"
                                                    th:data-adsoyad="${user.adSoyad}" th:data-role="${user.role}"
                                                    th:data-validfrom="${user.validFrom}" th:data-validto="${user.validTo}">
                                                <i class="ri-pencil-line"></i>
                                            </button>
                                            <form th:action="@{'/backoffice/kullanicilar/' + ${user.id} + '/aktif'}" method="post" style="display:inline">
                                                <button type="submit" class="btn btn-sm"
                                                        th:classappend="${user.aktif ? 'btn-soft-danger' : 'btn-soft-success'}"
                                                        th:title="${user.aktif ? 'Pasife Al' : 'Aktifleştir'}">
                                                    <i th:class="${user.aktif ? 'ri-close-circle-line' : 'ri-checkbox-circle-line'}"></i>
                                                </button>
                                            </form>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

</section>

<th:block layout:fragment="modal">
    <!-- Ekle Modal -->
    <div class="modal fade" id="addUserModal" tabindex="-1" aria-labelledby="addUserModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <form th:action="@{/backoffice/kullanicilar}" method="post">
                    <div class="modal-header">
                        <h5 class="modal-title" id="addUserModalLabel">Yeni Kullanıcı Ekle</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Kapat"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">E-posta</label>
                            <input type="email" name="email" class="form-control" required placeholder="E-posta adresi"
                                   oninvalid="this.setCustomValidity(this.validity.valueMissing ? 'Lütfen e-posta adresini girin' : 'Lütfen geçerli bir e-posta adresi girin')"
                                   oninput="this.setCustomValidity('')">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Kullanıcı Adı (opsiyonel)</label>
                            <input type="text" name="username" class="form-control" placeholder="(opsiyonel)">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Şifre</label>
                            <input type="password" name="password" class="form-control" required placeholder="Şifre"
                                   oninvalid="this.setCustomValidity('Lütfen şifre girin')"
                                   oninput="this.setCustomValidity('')">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Ad Soyad</label>
                            <input type="text" name="adSoyad" class="form-control" placeholder="Ad Soyad">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Rol</label>
                            <select name="role" class="form-select" required
                                    oninvalid="this.setCustomValidity('Lütfen bir rol seçin')"
                                    onchange="this.setCustomValidity('')">
                                <option value="USER">USER</option>
                                <option value="ADMIN">ADMIN</option>
                            </select>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Geçerlilik Başlangıç</label>
                                <input type="date" name="validFrom" class="form-control">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Geçerlilik Bitiş</label>
                                <input type="date" name="validTo" class="form-control">
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-light" data-bs-dismiss="modal">İptal</button>
                        <button type="submit" class="btn btn-primary">Kaydet</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Düzenle Modal -->
    <div class="modal fade" id="editUserModal" tabindex="-1" aria-labelledby="editUserModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <form id="editUserForm" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <div class="modal-header">
                        <h5 class="modal-title" id="editUserModalLabel">Kullanıcı Düzenle</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Kapat"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">E-posta</label>
                            <input type="email" name="email" class="form-control" required
                                   oninvalid="this.setCustomValidity(this.validity.valueMissing ? 'Lütfen e-posta adresini girin' : 'Lütfen geçerli bir e-posta adresi girin')"
                                   oninput="this.setCustomValidity('')">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Kullanıcı Adı (opsiyonel)</label>
                            <input type="text" name="username" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Şifre <small class="text-muted">(boş bırakılırsa değişmez)</small></label>
                            <input type="password" name="password" class="form-control" placeholder="Yeni şifre (opsiyonel)">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Ad Soyad</label>
                            <input type="text" name="adSoyad" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Rol</label>
                            <select name="role" class="form-select" required
                                    oninvalid="this.setCustomValidity('Lütfen bir rol seçin')"
                                    onchange="this.setCustomValidity('')">
                                <option value="USER">USER</option>
                                <option value="ADMIN">ADMIN</option>
                            </select>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Geçerlilik Başlangıç</label>
                                <input type="date" name="validFrom" class="form-control">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Geçerlilik Bitiş</label>
                                <input type="date" name="validTo" class="form-control">
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-light" data-bs-dismiss="modal">İptal</button>
                        <button type="submit" class="btn btn-primary">Güncelle</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</th:block>

<th:block layout:fragment="pagejs">
    <script>
        var editUserModal = document.getElementById('editUserModal');
        if (editUserModal) {
            editUserModal.addEventListener('show.bs.modal', function (event) {
                var btn = event.relatedTarget;
                var form = editUserModal.querySelector('form');
                form.action = '/backoffice/kullanicilar/' + btn.getAttribute('data-id');
                form.querySelector('[name=email]').value = btn.getAttribute('data-email') || '';
                form.querySelector('[name=username]').value = btn.getAttribute('data-username') || '';
                form.querySelector('[name=adSoyad]').value = btn.getAttribute('data-adsoyad') || '';
                form.querySelector('[name=role]').value = btn.getAttribute('data-role') || 'USER';
                form.querySelector('[name=validFrom]').value = btn.getAttribute('data-validfrom') || '';
                form.querySelector('[name=validTo]').value = btn.getAttribute('data-validto') || '';
                form.querySelector('[name=password]').value = '';
            });
        }
    </script>
</th:block>
</body>

</html>
