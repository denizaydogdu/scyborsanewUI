<!doctype html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>
    <th:block layout:fragment="pagetitle">
        <div th:replace="~{partials/title-meta :: title-meta('Tarama Sonuçları')}"></div>
    </th:block>
</head>

<body>
<section layout:fragment="content">
    <div th:replace="~{partials/page-title :: page-title('Tarama Sonuçları', 'Yönetim')}"></div>

    <!-- Flash messages -->
    <div class="row" th:if="${successMsg}">
        <div class="col-12">
            <div class="alert alert-success alert-dismissible fade show" role="alert" th:text="${successMsg}"></div>
        </div>
    </div>
    <div class="row" th:if="${errorMsg}">
        <div class="col-12">
            <div class="alert alert-danger alert-dismissible fade show" role="alert" th:text="${errorMsg}"></div>
        </div>
    </div>

    <!-- Row 1: 3 KPI cards -->
    <div class="row">
        <!-- Bugun Toplam -->
        <div class="col-xl-4 col-md-6">
            <div class="card card-animate">
                <div class="card-body">
                    <div class="d-flex align-items-center">
                        <div class="flex-grow-1">
                            <p class="text-uppercase fw-medium text-muted mb-0">Bugun Toplam</p>
                        </div>
                    </div>
                    <div class="d-flex align-items-end justify-content-between mt-4">
                        <div>
                            <h4 class="fs-22 fw-semibold ff-secondary mb-4"
                                th:text="${stats != null and stats.screener != null ? stats.screener.todayTotal : 0}">0</h4>
                        </div>
                        <div class="avatar-sm flex-shrink-0">
                            <span class="avatar-title bg-primary-subtle rounded fs-3">
                                <i class="ri-search-eye-line text-primary"></i>
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Telegram Gonderildi -->
        <div class="col-xl-4 col-md-6">
            <div class="card card-animate">
                <div class="card-body">
                    <div class="d-flex align-items-center">
                        <div class="flex-grow-1">
                            <p class="text-uppercase fw-medium text-muted mb-0">Telegram Gonderildi</p>
                        </div>
                    </div>
                    <div class="d-flex align-items-end justify-content-between mt-4">
                        <div>
                            <h4 class="fs-22 fw-semibold ff-secondary mb-4"
                                th:text="${stats != null and stats.screener != null ? stats.screener.telegramSent : 0}">0</h4>
                        </div>
                        <div class="avatar-sm flex-shrink-0">
                            <span class="avatar-title bg-success-subtle rounded fs-3">
                                <i class="ri-send-plane-line text-success"></i>
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bekleyen TP/SL -->
        <div class="col-xl-4 col-md-6">
            <div class="card card-animate">
                <div class="card-body">
                    <div class="d-flex align-items-center">
                        <div class="flex-grow-1">
                            <p class="text-uppercase fw-medium text-muted mb-0">Bekleyen TP/SL</p>
                        </div>
                    </div>
                    <div class="d-flex align-items-end justify-content-between mt-4">
                        <div>
                            <h4 class="fs-22 fw-semibold ff-secondary mb-4"
                                th:text="${stats != null and stats.screener != null ? stats.screener.tpSlPending : 0}">0</h4>
                        </div>
                        <div class="avatar-sm flex-shrink-0">
                            <span class="avatar-title bg-warning-subtle rounded fs-3">
                                <i class="ri-time-line text-warning"></i>
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Tarama Tablosu -->
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-header">
                    <h5 class="card-title mb-0">Bugunun Taramalari</h5>
                </div>
                <div class="card-body">
                    <!-- Empty state -->
                    <div th:if="${taramalar == null or #lists.isEmpty(taramalar)}" class="text-center py-5">
                        <i class="ri-search-eye-line fs-1 text-muted"></i>
                        <h5 class="mt-3 text-muted">Bugun tarama sonucu bulunamadi</h5>
                    </div>

                    <!-- Table -->
                    <div th:unless="${taramalar == null or #lists.isEmpty(taramalar)}" class="table-responsive">
                        <table class="table table-bordered table-nowrap align-middle mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>Hisse</th>
                                    <th>Fiyat</th>
                                    <th>%Degisim</th>
                                    <th>Tarama Adi</th>
                                    <th>Tur</th>
                                    <th>Saat</th>
                                    <th>Telegram</th>
                                    <th>TP/SL</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="t, iter : ${taramalar}">
                                    <td th:text="${t.stockName}">THYAO</td>
                                    <td th:text="${t.price}">0</td>
                                    <td>
                                        <span th:if="${t.percentage != null and t.percentage >= 0}" class="text-success"
                                              th:text="${#numbers.formatDecimal(t.percentage, 1, 2) + '%'}">0%</span>
                                        <span th:if="${t.percentage != null and t.percentage < 0}" class="text-danger"
                                              th:text="${#numbers.formatDecimal(t.percentage, 1, 2) + '%'}">0%</span>
                                        <span th:if="${t.percentage == null}" class="text-muted">-</span>
                                    </td>
                                    <td th:text="${t.screenerName != null ? t.screenerName : '-'}">-</td>
                                    <td th:text="${t.screenerType != null ? t.screenerType : '-'}">-</td>
                                    <td th:text="${t.screenerTime != null ? t.screenerTime : '-'}">-</td>
                                    <td>
                                        <span th:if="${t.telegramSent == true}" class="badge bg-success-subtle text-success">Gonderildi</span>
                                        <span th:unless="${t.telegramSent == true}" class="badge bg-warning-subtle text-warning">Bekliyor</span>
                                    </td>
                                    <td>
                                        <span th:if="${t.tpCheckDone == true}" class="badge bg-success-subtle text-success">TP</span>
                                        <span th:if="${t.slCheckDone == true}" class="badge bg-danger-subtle text-danger">SL</span>
                                        <span th:if="${t.tpCheckDone != true and t.slCheckDone != true}" class="text-muted">-</span>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

</section>

<th:block layout:fragment="pagejs">
</th:block>
</body>

</html>
