<!doctype html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>
    <th:block layout:fragment="pagetitle">
        <div th:replace="~{partials/title-meta :: title-meta('Açığa Satış İstatistikleri')}"></div>
    </th:block>
</head>

<body>
<section layout:fragment="content">
    <div th:replace="~{partials/page-title :: page-title('Açığa Satış', 'Piyasa')}"></div>

    <!-- KPI Kartlari -->
    <div class="row">
        <div class="col-xl-4 col-md-6">
            <div class="card card-animate">
                <div class="card-body">
                    <div class="d-flex align-items-center">
                        <div class="flex-grow-1">
                            <p class="text-uppercase fw-medium text-muted mb-0">Toplam Hisse</p>
                        </div>
                    </div>
                    <div class="d-flex align-items-end justify-content-between mt-3">
                        <div>
                            <h4 class="fs-22 fw-semibold mb-0" th:text="${toplamHisse}">0</h4>
                        </div>
                        <div class="avatar-sm flex-shrink-0">
                            <span class="avatar-title bg-light rounded fs-3">
                                <i class="ri-bar-chart-2-line text-primary"></i>
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-xl-4 col-md-6">
            <div class="card card-animate">
                <div class="card-body">
                    <div class="d-flex align-items-center">
                        <div class="flex-grow-1">
                            <p class="text-uppercase fw-medium text-muted mb-0">En Yüksek Açığa Satış</p>
                        </div>
                    </div>
                    <div class="d-flex align-items-end justify-content-between mt-3">
                        <div>
                            <h4 class="fs-22 fw-semibold mb-0 text-danger" th:text="${enYuksekHisse}">-</h4>
                        </div>
                        <div class="avatar-sm flex-shrink-0">
                            <span class="avatar-title bg-light rounded fs-3">
                                <i class="ri-arrow-up-circle-line text-danger"></i>
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-xl-4 col-md-6">
            <div class="card card-animate">
                <div class="card-body">
                    <div class="d-flex align-items-center">
                        <div class="flex-grow-1">
                            <p class="text-uppercase fw-medium text-muted mb-0">Ort. Açığa Satış Oranı</p>
                        </div>
                    </div>
                    <div class="d-flex align-items-end justify-content-between mt-3">
                        <div>
                            <h4 class="fs-22 fw-semibold mb-0 text-warning">%<span th:text="${ortalamaOran}">0</span></h4>
                        </div>
                        <div class="avatar-sm flex-shrink-0">
                            <span class="avatar-title bg-light rounded fs-3">
                                <i class="ri-percent-line text-warning"></i>
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Tablo -->
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-header d-flex align-items-center gap-2">
                    <h5 class="card-title mb-0 flex-grow-1">Açığa Satış İstatistikleri</h5>
                    <div class="d-flex gap-2">
                        <input type="text" id="searchInput" class="form-control form-control-sm"
                               placeholder="Hisse ara..." style="width: 180px;">
                    </div>
                    <span class="badge bg-danger fs-12" th:text="${toplamHisse} + ' Hisse'"
                          th:if="${toplamHisse != null and toplamHisse > 0}">0 Hisse</span>
                </div>
                <div class="card-body">
                    <div id="tableContainer" th:if="${veriler != null and !#lists.isEmpty(veriler)}">
                        <div class="table-responsive">
                            <table class="table table-striped align-middle mb-0">
                                <thead>
                                <tr>
                                    <th style="width: 50px;">#</th>
                                    <th class="sortable" data-sort="hisse">Hisse Kodu</th>
                                    <th class="sortable text-end" data-sort="lot">Açığa Satış Lotu</th>
                                    <th class="sortable text-end" data-sort="toplamLot">Toplam İşlem Lotu</th>
                                    <th class="sortable text-end" data-sort="oran">Oran (%)</th>
                                    <th class="sortable text-end" data-sort="fiyat">Ort. Fiyat</th>
                                    <th class="sortable text-end" data-sort="hacim">Hacim (TL)</th>
                                </tr>
                                </thead>
                                <tbody id="acigaSatisTableBody">
                                <!-- JS ile doldurulacak -->
                                </tbody>
                            </table>
                        </div>

                        <!-- Pagination -->
                        <div class="d-flex justify-content-between align-items-center mt-3">
                            <div id="pageInfo" class="text-muted small"></div>
                            <nav>
                                <ul class="pagination pagination-sm mb-0" id="pagination"></ul>
                            </nav>
                        </div>
                    </div>

                    <!-- Bos durum -->
                    <div class="text-center py-5" th:if="${veriler == null or #lists.isEmpty(veriler)}">
                        <i class="ri-bar-chart-2-line fs-1 text-muted"></i>
                        <h5 class="mt-3 text-muted">Açığa satış verisi bulunamadı</h5>
                        <p class="text-muted">Şu anda açığa satış istatistiği bulunmamaktadır.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<th:block layout:fragment="pagejs">
    <script th:inline="javascript">
        window.acigaSatisData = /*[[${veriler}]]*/ [];
    </script>
    <script th:src="@{/js/aciga-satis.js}"></script>
</th:block>
</body>

</html>
