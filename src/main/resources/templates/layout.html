<html lang="en" data-layout="vertical" data-topbar="light" data-sidebar="dark" data-sidebar-size="lg" data-sidebar-image="none" data-preloader="disable" xmlns="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">

<head>
	<th:block layout:fragment="pagetitle" />
	<!-- Page CSS -->
	<div th:replace="~{partials/head-css :: head-css}"></div>
</head>

<body data-sidebar="dark" data-layout-mode="light" th:data-user-email="${userEmail}" th:data-api-base="${apiBaseUrl}">
	<!-- Google Tag Manager (noscript) -->
	<noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-WN5GTRFB"
	height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
	<!-- End Google Tag Manager (noscript) -->
	<div id="layout-wrapper">
		<div th:replace="~{partials/topbar :: topbar}"></div>

		<div th:replace="~{partials/sidebar :: sidebar}"></div>

		<div class="main-content">
			<div class="page-content">
				<div class="container-fluid">

					<section layout:fragment="content" th:remove="tag">

					</section>
				</div>
			</div>
			<div th:replace="~{partials/footer :: footer}"></div>
		</div>
	</div>

	<th:block layout:fragment="modal" />


	<div th:replace="~{partials/vendor-scripts :: scripts}"></div>

	<th:block layout:fragment="pagejs" />
	<!-- App js -->
	<script th:src="@{/assets/js/app.js}"></script>
	<!-- Hisse Arama Autocomplete -->
	<script th:src="@{/js/stock-search.js}"></script>
	<!-- Session Guard — oturum bitince login'e yonlendir -->
	<script th:src="@{/js/session-guard.js}"></script>
	<!-- StompJS + SockJS (alarm bildirimler icin global) -->
	<script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.0.0/bundles/stomp.umd.min.js"></script>
	<script th:src="@{/webjars/sockjs-client/sockjs.min.js}"></script>
	<!-- Alarm Bildirim Sistemi -->
	<script th:src="@{/js/alarm-notifications.js}"></script>
</body>

</html>
