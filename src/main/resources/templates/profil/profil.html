<!doctype html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>
    <th:block layout:fragment="pagetitle">
        <div th:replace="~{partials/title-meta :: title-meta('Profilim')}"></div>
    </th:block>
</head>

<body>
<section layout:fragment="content">
    <div th:replace="~{partials/page-title :: page-title('Profilim', 'Hesap')}"></div>

    <!-- Flash messages -->
    <div class="row" th:if="${successMsg}">
        <div class="col-12">
            <div class="alert alert-success alert-dismissible fade show" role="alert">
                <span th:text="${successMsg}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Kapat"></button>
            </div>
        </div>
    </div>
    <div class="row" th:if="${errorMsg}">
        <div class="col-12">
            <div class="alert alert-danger alert-dismissible fade show" role="alert">
                <span th:text="${errorMsg}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Kapat"></button>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-lg-6">
            <div class="card">
                <div class="card-header">
                    <h5 class="card-title mb-0">Profil Bilgileri</h5>
                </div>
                <div class="card-body">
                    <form th:action="@{/profil}" method="post">

                        <!-- Email (readonly) -->
                        <div class="mb-3">
                            <label class="form-label">E-posta</label>
                            <input type="email" class="form-control" th:value="${user.email}" disabled>
                        </div>

                        <!-- Ad Soyad (editable, required) -->
                        <div class="mb-3">
                            <label class="form-label">Ad Soyad</label>
                            <input type="text" name="adSoyad" class="form-control" th:value="${user.adSoyad}"
                                   required placeholder="Ad Soyad"
                                   oninvalid="this.setCustomValidity('Lütfen ad soyad bilgisini girin')"
                                   oninput="this.setCustomValidity('')">
                        </div>

                        <!-- Telegram Adi -->
                        <div class="mb-3">
                            <label class="form-label">Telegram Adı</label>
                            <div class="input-group">
                                <span class="input-group-text">@</span>
                                <input type="text" name="telegramUsername" class="form-control"
                                       th:value="${user.telegramUsername}" placeholder="Telegram kullanıcı adı">
                            </div>
                        </div>

                        <!-- Telefon Numarasi -->
                        <div class="mb-3">
                            <label class="form-label">Telefon Numarası</label>
                            <input type="text" name="phoneNumber" class="form-control"
                                   th:value="${user.phoneNumber}" placeholder="Örn: 555 444 33 22">
                        </div>

                        <!-- Sifre (opsiyonel) -->
                        <div class="mb-3">
                            <label class="form-label">Yeni Şifre <small class="text-muted">(boş bırakılırsa değişmez)</small></label>
                            <div class="input-group">
                                <input type="password" id="password" name="password" class="form-control"
                                       placeholder="Yeni şifre">
                                <button class="btn btn-outline-secondary" type="button" onclick="togglePasswordVisibility('password', this)">
                                    <i class="ri-eye-off-line"></i>
                                </button>
                            </div>
                            <!-- Şifre kuralları -->
                            <div id="pwRules" class="mt-2" style="display:none;">
                                <small id="ruleLen" class="d-block text-muted"><i class="ri-close-circle-line me-1"></i>En az 6 karakter</small>
                                <small id="ruleUpper" class="d-block text-muted"><i class="ri-close-circle-line me-1"></i>En az 1 büyük harf</small>
                                <small id="ruleLower" class="d-block text-muted"><i class="ri-close-circle-line me-1"></i>En az 1 küçük harf</small>
                                <small id="ruleDigit" class="d-block text-muted"><i class="ri-close-circle-line me-1"></i>En az 1 rakam</small>
                                <!-- Güç göstergesi -->
                                <div class="progress mt-2" style="height: 6px;">
                                    <div id="pwStrength" class="progress-bar" role="progressbar" style="width: 0%"></div>
                                </div>
                                <small id="pwStrengthText" class="text-muted"></small>
                            </div>
                        </div>

                        <!-- Sifre Tekrar -->
                        <div class="mb-3">
                            <label class="form-label">Yeni Şifre (Tekrar)</label>
                            <div class="input-group">
                                <input type="password" id="passwordConfirm" class="form-control"
                                       placeholder="Yeni şifreyi tekrar girin">
                                <button class="btn btn-outline-secondary" type="button" onclick="togglePasswordVisibility('passwordConfirm', this)">
                                    <i class="ri-eye-off-line"></i>
                                </button>
                            </div>
                            <div id="passwordMismatch" class="invalid-feedback">Şifreler eşleşmiyor.</div>
                        </div>

                        <!-- Hesap Baslangic (readonly) -->
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Hesap Başlangıç</label>
                                <input type="text" class="form-control"
                                       th:value="${user.validFrom != null ? #temporals.format(user.validFrom, 'dd.MM.yyyy') : '-'}"
                                       disabled>
                            </div>

                            <!-- Hesap Bitis (readonly) -->
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Hesap Bitiş</label>
                                <input type="text" class="form-control"
                                       th:value="${user.validTo != null ? #temporals.format(user.validTo, 'dd.MM.yyyy') : '-'}"
                                       disabled>
                            </div>
                        </div>

                        <div class="text-end">
                            <button type="submit" class="btn btn-primary">
                                <i class="ri-save-line me-1"></i> Kaydet
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        function togglePasswordVisibility(inputId, btn) {
            var input = document.getElementById(inputId);
            var icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'ri-eye-line';
            } else {
                input.type = 'password';
                icon.className = 'ri-eye-off-line';
            }
        }
        (function () {
            var pw = document.getElementById('password');
            var pwc = document.getElementById('passwordConfirm');
            var form = pw.closest('form');
            var rulesBox = document.getElementById('pwRules');

            // Kural elementleri
            var rules = {
                len:   document.getElementById('ruleLen'),
                upper: document.getElementById('ruleUpper'),
                lower: document.getElementById('ruleLower'),
                digit: document.getElementById('ruleDigit')
            };
            var strengthBar = document.getElementById('pwStrength');
            var strengthText = document.getElementById('pwStrengthText');

            function setRule(el, passed) {
                if (passed) {
                    el.classList.remove('text-muted');
                    el.classList.add('text-success');
                    el.querySelector('i').className = 'ri-checkbox-circle-line me-1';
                } else {
                    el.classList.remove('text-success');
                    el.classList.add('text-muted');
                    el.querySelector('i').className = 'ri-close-circle-line me-1';
                }
            }

            function checkRules(val) {
                var len = val.length >= 6;
                var upper = /[A-Z]/.test(val);
                var lower = /[a-z]/.test(val);
                var digit = /[0-9]/.test(val);

                setRule(rules.len, len);
                setRule(rules.upper, upper);
                setRule(rules.lower, lower);
                setRule(rules.digit, digit);

                // Güç hesapla (0-4)
                var score = (len ? 1 : 0) + (upper ? 1 : 0) + (lower ? 1 : 0) + (digit ? 1 : 0);
                var pct = score * 25;
                var colors = ['', 'bg-danger', 'bg-warning', 'bg-info', 'bg-success'];
                var labels = ['', 'Zayıf', 'Orta', 'İyi', 'Güçlü'];

                strengthBar.style.width = pct + '%';
                strengthBar.className = 'progress-bar ' + (colors[score] || '');
                strengthText.textContent = labels[score] || '';

                return len && upper && lower && digit;
            }

            function validateMatch() {
                if (pw.value && pw.value !== pwc.value) {
                    pwc.classList.add('is-invalid');
                    pwc.setCustomValidity('Şifreler eşleşmiyor');
                } else {
                    pwc.classList.remove('is-invalid');
                    pwc.setCustomValidity('');
                }
            }

            pw.addEventListener('focus', function () {
                rulesBox.style.display = 'block';
            });

            pw.addEventListener('input', function () {
                var val = pw.value;
                if (val) {
                    rulesBox.style.display = 'block';
                    var allPassed = checkRules(val);
                    if (!allPassed) {
                        pw.setCustomValidity('Şifre kurallarını karşılamıyor');
                    } else {
                        pw.setCustomValidity('');
                    }
                } else {
                    rulesBox.style.display = 'none';
                    pw.setCustomValidity('');
                }
                validateMatch();
            });

            pwc.addEventListener('input', validateMatch);

            form.addEventListener('submit', function (e) {
                // Şifre girilmişse kuralları kontrol et
                if (pw.value) {
                    if (!checkRules(pw.value)) {
                        e.preventDefault();
                        pw.focus();
                        return;
                    }
                    if (pw.value !== pwc.value) {
                        e.preventDefault();
                        pwc.classList.add('is-invalid');
                        pwc.focus();
                        return;
                    }
                }
            });
        })();
    </script>

</section>
</body>

</html>
