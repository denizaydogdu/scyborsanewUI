<!doctype html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>
    <th:block layout:fragment="pagetitle">
        <div th:replace="~{partials/title-meta :: title-meta('Taramalar')}"></div>
    </th:block>
</head>

<body>
<section layout:fragment="content">
    <div th:replace="~{partials/page-title :: page-title('Taramalar', 'Piyasa')}"></div>

    <!-- Row 1: 4 KPI Cards -->
    <div class="row">
        <!-- KPI 1: Toplam Sinyal -->
        <div class="col-xl-3 col-md-6">
            <div class="card card-animate">
                <div class="card-body">
                    <div class="d-flex align-items-center">
                        <div class="flex-grow-1 overflow-hidden">
                            <p class="text-uppercase fw-medium text-muted text-truncate mb-0">Toplam Sinyal</p>
                        </div>
                    </div>
                    <div class="d-flex align-items-end justify-content-between mt-4">
                        <div>
                            <h4 class="fs-22 fw-semibold ff-secondary mb-4"
                                th:text="${ozet?.toplamSinyal} ?: 0">0</h4>
                        </div>
                        <div class="avatar-sm flex-shrink-0">
                            <span class="avatar-title bg-white rounded fs-3 border">
                                <i class="ri-scan-line text-primary"></i>
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- KPI 2: Başarı Oranı -->
        <div class="col-xl-3 col-md-6">
            <div class="card card-animate">
                <div class="card-body">
                    <div class="d-flex align-items-center">
                        <div class="flex-grow-1 overflow-hidden">
                            <p class="text-uppercase fw-medium text-muted text-truncate mb-0">Başarı Oranı</p>
                        </div>
                    </div>
                    <div class="d-flex align-items-end justify-content-between mt-4">
                        <div>
                            <h4 class="fs-22 fw-semibold ff-secondary mb-4"
                                th:classappend="${ozet != null and ozet.basariOrani != null and ozet.basariOrani >= 50} ? 'text-success' : 'text-danger'"
                                th:text="${ozet?.getFormattedBasariOrani()} ?: '0.0%'">0.0%</h4>
                        </div>
                        <div class="avatar-sm flex-shrink-0">
                            <span class="avatar-title bg-white rounded fs-3 border">
                                <i class="ri-percent-line"
                                   th:classappend="${ozet != null and ozet.basariOrani != null and ozet.basariOrani >= 50} ? ' text-success' : ' text-danger'"></i>
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- KPI 3: Ortalama Getiri -->
        <div class="col-xl-3 col-md-6">
            <div class="card card-animate">
                <div class="card-body">
                    <div class="d-flex align-items-center">
                        <div class="flex-grow-1 overflow-hidden">
                            <p class="text-uppercase fw-medium text-muted text-truncate mb-0">Ortalama Getiri</p>
                        </div>
                    </div>
                    <div class="d-flex align-items-end justify-content-between mt-4">
                        <div>
                            <h4 class="fs-22 fw-semibold ff-secondary mb-4"
                                th:classappend="${ozet != null and ozet.ortalamaGetiri != null and ozet.pozitif} ? 'text-success' : (${ozet != null and ozet.ortalamaGetiri != null} ? 'text-danger' : '')"
                                th:text="${ozet?.getFormattedOrtalamaGetiri()} ?: '0.00%'">0.00%</h4>
                        </div>
                        <div class="avatar-sm flex-shrink-0">
                            <span class="avatar-title bg-white rounded fs-3 border">
                                <i class="ri-line-chart-line"
                                   th:classappend="${ozet != null and ozet.ortalamaGetiri != null and ozet.pozitif} ? ' text-success' : (${ozet != null and ozet.ortalamaGetiri != null} ? ' text-danger' : '')"></i>
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- KPI 4: Benzersiz Hisse -->
        <div class="col-xl-3 col-md-6">
            <div class="card card-animate">
                <div class="card-body">
                    <div class="d-flex align-items-center">
                        <div class="flex-grow-1 overflow-hidden">
                            <p class="text-uppercase fw-medium text-muted text-truncate mb-0">Benzersiz Hisse</p>
                        </div>
                    </div>
                    <div class="d-flex align-items-end justify-content-between mt-4">
                        <div>
                            <h4 class="fs-22 fw-semibold ff-secondary mb-4"
                                th:text="${ozet?.benzersizHisseSayisi} ?: 0">0</h4>
                        </div>
                        <div class="avatar-sm flex-shrink-0">
                            <span class="avatar-title bg-white rounded fs-3 border">
                                <i class="ri-stock-line text-primary"></i>
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Row 2: Filter Section -->
    <div class="row">
        <div class="col-lg-12">
            <div class="card">
                <div class="card-body">
                    <div class="row g-3 align-items-end">
                        <div class="col-md-2">
                            <label for="startDate" class="form-label">Başlangıç Tarihi</label>
                            <input type="date" class="form-control" id="startDate"
                                   th:value="${startDate}" th:max="${today}"/>
                        </div>
                        <div class="col-md-2">
                            <label for="endDate" class="form-label">Bitiş Tarihi</label>
                            <input type="date" class="form-control" id="endDate"
                                   th:value="${endDate}" th:max="${today}"/>
                        </div>
                        <div class="col-md-2">
                            <label for="screenerFilter" class="form-label">Tarama</label>
                            <select class="form-select" id="screenerFilter">
                                <option value="">Tümü</option>
                                <option th:each="name : ${screenerNames}"
                                        th:value="${name}" th:text="${name}"
                                        th:selected="${name == selectedScreener}">Tarama</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <label for="stockFilter" class="form-label">Hisse</label>
                            <input type="text" class="form-control" id="stockFilter"
                                   placeholder="GARAN, THYAO..."
                                   th:value="${selectedStock}"/>
                        </div>
                        <div class="col-md-4">
                            <div class="d-flex gap-2">
                                <button type="button" class="btn btn-primary" onclick="applyFilter()">
                                    <i class="ri-search-line me-1"></i> Filtrele
                                </button>
                                <button type="button" class="btn btn-soft-info" onclick="setToday()">
                                    <i class="ri-calendar-line me-1"></i> Bugün
                                </button>
                                <button type="button" class="btn btn-soft-warning" onclick="location.reload()">
                                    <i class="ri-refresh-line me-1"></i> Yenile
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Row 3: Ana Tablo -->
    <div class="row">
        <div class="col-lg-12">
            <div class="card">
                <div class="card-header align-items-center d-flex">
                    <h4 class="card-title mb-0 flex-grow-1">Tarama Sonuçları</h4>
                    <div class="flex-shrink-0">
                        <span class="badge bg-primary-subtle text-primary"
                              th:text="${#lists.size(taramalar)} + ' Sinyal'">0 Sinyal</span>
                    </div>
                </div>
                <div class="card-body">
                    <!-- Empty state -->
                    <div th:if="${#lists.isEmpty(taramalar)}" class="text-center py-5">
                        <lord-icon src="https://cdn.lordicon.com/msoeawqm.json" trigger="loop"
                                   colors="primary:#405189,secondary:#0ab39c" style="width:75px;height:75px"></lord-icon>
                        <h5 class="mt-2">Veri Bulunamadı</h5>
                        <p class="text-muted mb-0">Seçilen filtrelere uygun tarama sonucu bulunamadı.</p>
                    </div>

                    <!-- Data table -->
                    <div th:if="${!#lists.isEmpty(taramalar)}" class="table-responsive">
                        <table class="table table-hover align-middle mb-0" id="taramalarTable">
                            <thead class="table-light">
                                <tr>
                                    <th scope="col" style="width:50px">#</th>
                                    <th scope="col">Hisse</th>
                                    <th scope="col" class="text-end">Fiyat</th>
                                    <th scope="col" class="text-end">Sinyal %</th>
                                    <th scope="col" class="text-end">Gün Sonu %</th>
                                    <th scope="col">Tarama</th>
                                    <th scope="col">Saat</th>
                                    <th scope="col">Tarih</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="t, stat : ${taramalar}">
                                    <td th:text="${stat.index + 1}">1</td>
                                    <td>
                                        <a th:href="@{/stock/detail/{code}(code=${t.stockName})}"
                                           class="fw-medium text-body"
                                           th:text="${t.stockName}">GARAN</a>
                                    </td>
                                    <td class="text-end" th:text="${t.formattedPrice}">0.00</td>
                                    <td class="text-end fw-medium"
                                        th:classappend="${t.cssClass}"
                                        th:text="${t.formattedPercentage}">0.00%</td>
                                    <td class="text-end fw-medium">
                                        <span th:text="${t.formattedGunSonuDegisim}" th:class="${t.gunSonuCssClass}"></span>
                                    </td>
                                    <td>
                                        <span th:if="${!t.grouped}"
                                              class="badge bg-primary-subtle text-primary"
                                              th:text="${t.screenerName}">Tarama</span>
                                        <span th:if="${t.grouped}"
                                              class="badge"
                                              style="background: linear-gradient(135deg, #405189, #0ab39c); color: #fff;"
                                              th:text="${t.screenerName}">Tarama</span>
                                    </td>
                                    <td class="text-muted" th:text="${t.screenerTime}">10:30</td>
                                    <td class="text-muted" th:text="${t.screenerDay}">2025-01-15</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

</section>

<th:block layout:fragment="pagejs">
<script th:inline="javascript">
/*<![CDATA[*/
function applyFilter() {
    var startDate = document.getElementById('startDate').value;
    var endDate = document.getElementById('endDate').value;
    var screener = document.getElementById('screenerFilter').value;
    var stock = document.getElementById('stockFilter').value;
    var url = '/taramalar?startDate=' + encodeURIComponent(startDate) + '&endDate=' + encodeURIComponent(endDate);
    if (screener) url += '&screener=' + encodeURIComponent(screener);
    if (stock) url += '&stock=' + encodeURIComponent(stock);
    window.location.href = url;
}

function setToday() {
    var today = /*[[${today}]]*/ '';
    document.getElementById('startDate').value = today;
    document.getElementById('endDate').value = today;
    applyFilter();
}

document.addEventListener('DOMContentLoaded', function() {
    ['startDate', 'endDate', 'stockFilter'].forEach(function(id) {
        var el = document.getElementById(id);
        if (el) {
            el.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') applyFilter();
            });
        }
    });
    var sel = document.getElementById('screenerFilter');
    if (sel) {
        sel.addEventListener('change', function() { applyFilter(); });
    }
});
/*]]>*/
</script>
</th:block>
</body>

</html>
