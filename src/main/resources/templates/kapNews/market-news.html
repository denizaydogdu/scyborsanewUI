<!doctype html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>
    <th:block layout:fragment="pagetitle">
        <div th:replace="~{partials/title-meta :: title-meta('Piyasa Haberleri')}"></div>
    </th:block>
</head>

<body>
<section layout:fragment="content">
    <div th:replace="~{partials/page-title :: page-title('Piyasa Haberleri', 'Haberler')}"></div>

    <!-- KPI Kartlar -->
    <div class="row mb-3">
        <div class="col-lg-4 col-md-4">
            <div class="card card-animate border-start border-start-3 border-warning mb-0">
                <div class="card-body py-3">
                    <div class="d-flex align-items-center">
                        <i class="ri-calendar-event-line text-warning fs-3 me-3"></i>
                        <div class="flex-grow-1">
                            <p class="text-uppercase fw-semibold fs-13 text-muted mb-1">Gelecek</p>
                            <h4 class="mb-0" id="kpi-future">0</h4>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-lg-4 col-md-4">
            <div class="card card-animate border-start border-start-3 border-success mb-0">
                <div class="card-body py-3">
                    <div class="d-flex align-items-center">
                        <i class="ri-calendar-check-line text-success fs-3 me-3"></i>
                        <div class="flex-grow-1">
                            <p class="text-uppercase fw-semibold fs-13 text-muted mb-1">Bugün</p>
                            <h4 class="mb-0" id="kpi-today">0</h4>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-lg-4 col-md-4">
            <div class="card card-animate border-start border-start-3 border-secondary mb-0">
                <div class="card-body py-3">
                    <div class="d-flex align-items-center">
                        <i class="ri-history-line text-secondary fs-3 me-3"></i>
                        <div class="flex-grow-1">
                            <p class="text-uppercase fw-semibold fs-13 text-muted mb-1">Geçmiş</p>
                            <h4 class="mb-0" id="kpi-past">0</h4>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Tab Navigation -->
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-header d-flex align-items-center justify-content-between">
                    <ul class="nav nav-tabs-custom card-header-tabs flex-grow-1" role="tablist">
                        <li class="nav-item">
                            <a class="nav-link fs-14 fw-semibold" id="tab-future" data-bs-toggle="tab" href="#panel-future" role="tab" aria-selected="false">
                                <i class="ri-calendar-event-line me-1"></i>Gelecek
                                <span class="badge bg-warning ms-1" id="badge-future">0</span>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active fs-14 fw-semibold" id="tab-today" data-bs-toggle="tab" href="#panel-today" role="tab" aria-selected="true">
                                <i class="ri-calendar-check-line me-1"></i>Bugün
                                <span class="badge bg-success ms-1" id="badge-today">0</span>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link fs-14 fw-semibold" id="tab-past" data-bs-toggle="tab" href="#panel-past" role="tab" aria-selected="false">
                                <i class="ri-history-line me-1"></i>Geçmiş
                                <span class="badge bg-secondary ms-1" id="badge-past">0</span>
                            </a>
                        </li>
                    </ul>
                    <div class="form-check form-switch ms-3 flex-shrink-0">
                        <input class="form-check-input" type="checkbox" id="marketKatilimFilter">
                        <label class="form-check-label fs-13" for="marketKatilimFilter">
                            <span class="badge bg-success bg-opacity-25 text-success" style="font-size:0.65rem;padding:2px 4px">K</span>
                            Katılım
                        </label>
                    </div>
                </div>
                <div class="card-body">
                    <div class="tab-content">
                        <!-- Gelecek -->
                        <div class="tab-pane" id="panel-future" role="tabpanel">
                            <div class="table-responsive">
                                <table class="table table-striped align-middle mb-0">
                                    <thead>
                                    <tr>
                                        <th style="width: 200px;">Hisse</th>
                                        <th>Başlık</th>
                                        <th style="width: 100px;">Kaynak</th>
                                        <th style="width: 180px;">Zaman</th>
                                        <th style="width: 80px;">Detay</th>
                                    </tr>
                                    </thead>
                                    <tbody id="tbody-future"></tbody>
                                </table>
                            </div>
                            <div class="text-center py-5 d-none" id="empty-future">
                                <i class="ri-calendar-event-line fs-1 text-muted"></i>
                                <h5 class="mt-3 text-muted">Gelecek tarihli haber yok</h5>
                            </div>
                        </div>

                        <!-- Bugün -->
                        <div class="tab-pane active show" id="panel-today" role="tabpanel">
                            <div class="table-responsive">
                                <table class="table table-striped align-middle mb-0">
                                    <thead>
                                    <tr>
                                        <th style="width: 200px;">Hisse</th>
                                        <th>Başlık</th>
                                        <th style="width: 100px;">Kaynak</th>
                                        <th style="width: 180px;">Zaman</th>
                                        <th style="width: 80px;">Detay</th>
                                    </tr>
                                    </thead>
                                    <tbody id="tbody-today"></tbody>
                                </table>
                            </div>
                            <div class="text-center py-5 d-none" id="empty-today">
                                <i class="ri-calendar-check-line fs-1 text-muted"></i>
                                <h5 class="mt-3 text-muted">Bugün piyasa haberi yok</h5>
                            </div>
                        </div>

                        <!-- Geçmiş -->
                        <div class="tab-pane" id="panel-past" role="tabpanel">
                            <div class="table-responsive">
                                <table class="table table-striped align-middle mb-0">
                                    <thead>
                                    <tr>
                                        <th style="width: 200px;">Hisse</th>
                                        <th>Başlık</th>
                                        <th style="width: 100px;">Kaynak</th>
                                        <th style="width: 180px;">Zaman</th>
                                        <th style="width: 80px;">Detay</th>
                                    </tr>
                                    </thead>
                                    <tbody id="tbody-past"></tbody>
                                </table>
                            </div>
                            <div class="text-center py-5 d-none" id="empty-past">
                                <i class="ri-history-line fs-1 text-muted"></i>
                                <h5 class="mt-3 text-muted">Geçmiş piyasa haberi yok</h5>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- SSR veri — Thymeleaf ile JSON olarak gomer, JS bolumu parse eder -->
    <script th:inline="javascript">
        var NEWS_ITEMS = /*[[${(marketNewsResponse != null && marketNewsResponse.items != null) ? marketNewsResponse.items : {}}]]*/ [];
        var LOGO_MAP = /*[[${logoMap}]]*/ {};
        var KATILIM_SET = /*[[${katilimCodes}]]*/ [];
    </script>
</section>

<th:block layout:fragment="pagejs">
    <script>
    (function() {
        var items = window.NEWS_ITEMS || [];
        var logoMap = window.LOGO_MAP || {};
        var katilimSet = {};
        if (Array.isArray(window.KATILIM_SET)) {
            window.KATILIM_SET.forEach(function(c) { katilimSet[c] = true; });
        } else if (window.KATILIM_SET && typeof window.KATILIM_SET === 'object') {
            Object.keys(window.KATILIM_SET).forEach(function(c) { katilimSet[c] = true; });
        }

        // Turkiye saat dilimine gore bugunun tarihini al
        var now = new Date();
        var turkeyOffset = 3 * 60; // UTC+3
        var utcMs = now.getTime() + (now.getTimezoneOffset() * 60000);
        var turkeyNow = new Date(utcMs + (turkeyOffset * 60000));
        var todayStr = turkeyNow.getFullYear() + '-' +
            String(turkeyNow.getMonth() + 1).padStart(2, '0') + '-' +
            String(turkeyNow.getDate()).padStart(2, '0');

        var future = [], today = [], past = [];

        items.forEach(function(item) {
            var itemDate = getItemDateStr(item);
            if (itemDate > todayStr) {
                future.push(item);
            } else if (itemDate === todayStr) {
                today.push(item);
            } else {
                past.push(item);
            }
        });

        // KPI ve badge guncelle
        setText('kpi-future', future.length);
        setText('kpi-today', today.length);
        setText('kpi-past', past.length);
        setText('badge-future', future.length);
        setText('badge-today', today.length);
        setText('badge-past', past.length);

        // Tablolari doldur
        fillTable('tbody-future', future, 'empty-future');
        fillTable('tbody-today', today, 'empty-today');
        fillTable('tbody-past', past, 'empty-past');

        // Bugün bos ise gelecege veya gecmise gec
        if (today.length === 0) {
            if (future.length > 0) {
                activateTab('tab-future', 'panel-future', 'panel-today');
            } else if (past.length > 0) {
                activateTab('tab-past', 'panel-past', 'panel-today');
            }
        }

        function getItemDateStr(item) {
            if (item.published) {
                var d = new Date(item.published * 1000);
                var utc = d.getTime() + (d.getTimezoneOffset() * 60000);
                var tr = new Date(utc + (turkeyOffset * 60000));
                return tr.getFullYear() + '-' +
                    String(tr.getMonth() + 1).padStart(2, '0') + '-' +
                    String(tr.getDate()).padStart(2, '0');
            }
            // formattedPublished'ten parse et: "03 Nisan 2026 14:30" veya "03 Nisan 2026"
            return parseTurkishDate(item.formattedPublished);
        }

        function parseTurkishDate(str) {
            if (!str || str === '-') return todayStr;
            var months = {
                'Ocak':'01','\u015Eubat':'02','Mart':'03','Nisan':'04',
                'May\u0131s':'05','Haziran':'06','Temmuz':'07','A\u011Fustos':'08',
                'Eyl\u00FCl':'09','Ekim':'10','Kas\u0131m':'11','Aral\u0131k':'12'
            };
            var parts = str.trim().split(/\s+/);
            if (parts.length >= 3) {
                var day = parts[0].padStart(2, '0');
                var month = months[parts[1]] || '01';
                var year = parts[2];
                return year + '-' + month + '-' + day;
            }
            return todayStr;
        }

        function fillTable(tbodyId, data, emptyId) {
            var tbody = document.getElementById(tbodyId);
            var empty = document.getElementById(emptyId);
            if (!data || data.length === 0) {
                empty.classList.remove('d-none');
                tbody.closest('.table-responsive').classList.add('d-none');
                return;
            }
            data.forEach(function(item) {
                var tr = document.createElement('tr');

                // 1. Hisse (logo + kod + katılım badge)
                var tdSymbols = document.createElement('td');
                var codes = [];
                if (item.relatedSymbols && item.relatedSymbols.length > 0) {
                    item.relatedSymbols.slice(0, 3).forEach(function(sym) {
                        var code = sym.symbol || '';
                        if (code.indexOf(':') > -1) code = code.substring(code.indexOf(':') + 1);
                        if (code) codes.push(code);
                    });
                }
                if (codes.length === 0) {
                    codes = extractCodesFromTitle(item.title);
                }
                if (codes.length > 0) {
                    codes.slice(0, 3).forEach(function(code) {
                        tdSymbols.appendChild(renderStockChip(code));
                    });
                } else {
                    tdSymbols.appendChild(renderHaberChip());
                }
                tr.appendChild(tdSymbols);

                // 2. Başlık
                var tdTitle = document.createElement('td');
                tdTitle.textContent = item.title || '';
                tr.appendChild(tdTitle);

                // 3. Kaynak
                var tdSource = document.createElement('td');
                if (item.source) {
                    var spanSource = document.createElement('span');
                    if (item.source === 'Piyasa') {
                        spanSource.className = 'badge bg-success-subtle text-success';
                    } else if (item.source === 'G\u00FCndem') {
                        spanSource.className = 'badge bg-warning-subtle text-warning';
                    } else {
                        spanSource.className = 'badge bg-secondary-subtle text-secondary';
                    }
                    spanSource.textContent = item.source;
                    tdSource.appendChild(spanSource);
                }
                tr.appendChild(tdSource);

                // 4. Zaman
                var tdTime = document.createElement('td');
                var spanTime = document.createElement('span');
                spanTime.className = 'text-muted fs-12';
                spanTime.textContent = item.formattedPublished || '';
                tdTime.appendChild(spanTime);
                tr.appendChild(tdTime);

                // 5. Detay
                var tdDetail = document.createElement('td');
                if (item.storyPath) {
                    var a = document.createElement('a');
                    a.href = '/haber/' + encodeURIComponent(item.id);
                    a.className = 'btn btn-sm btn-soft-primary';
                    var icon = document.createElement('i');
                    icon.className = 'ri-eye-line';
                    a.appendChild(icon);
                    tdDetail.appendChild(a);
                }
                tr.appendChild(tdDetail);

                tbody.appendChild(tr);
            });
        }

        function activateTab(tabId, showPanelId, hidePanelId) {
            var tab = document.getElementById(tabId);
            var showPanel = document.getElementById(showPanelId);
            var hidePanel = document.getElementById(hidePanelId);
            var hideTabId = hidePanelId.replace('panel-', 'tab-');
            var hideTab = document.getElementById(hideTabId);
            if (tab && showPanel && hidePanel && hideTab) {
                hideTab.classList.remove('active');
                hideTab.setAttribute('aria-selected', 'false');
                hidePanel.classList.remove('active', 'show');
                tab.classList.add('active');
                tab.setAttribute('aria-selected', 'true');
                showPanel.classList.add('active', 'show');
            }
        }

        function extractCodesFromTitle(title) {
            if (!title) return [];
            var codes = [];
            // Pattern 1: "KAP: XXXXX" prefix
            var kapMatch = title.match(/^KAP:\s*([A-Z0-9]{2,10})/);
            if (kapMatch) codes.push(kapMatch[1]);
            // Pattern 2: "[XXX YYY ZZZ]" köşeli parantez
            var bracketMatch = title.match(/\[([A-Z0-9\s]+)\]/);
            if (bracketMatch) {
                bracketMatch[1].trim().split(/\s+/).forEach(function(c) {
                    if (c.length >= 2 && c.length <= 10 && codes.indexOf(c) === -1) codes.push(c);
                });
            }
            // Pattern 3: İlk kelime BÜYÜK HARF hisse kodu ise (örn. "AFYON Temettü Dağıtımı")
            if (codes.length === 0) {
                var firstWord = title.match(/^([A-Z0-9]{2,10})\s/);
                if (firstWord) codes.push(firstWord[1]);
            }
            return codes;
        }

        function renderStockChip(code) {
            var wrapper = document.createElement('div');
            wrapper.className = 'd-inline-flex align-items-center me-2 mb-1';
            var avatarContainer = document.createElement('div');
            avatarContainer.className = 'flex-shrink-0 avatar-xs me-1';
            var logoid = logoMap[code];
            if (logoid) {
                var img = document.createElement('img');
                img.src = '/img/stock-logos/' + logoid;
                img.alt = code;
                img.className = 'avatar-xs rounded-circle';
                img.onerror = function() { this.style.display = 'none'; this.nextElementSibling.style.display = 'flex'; };
                avatarContainer.appendChild(img);
            }
            var fallback = document.createElement('div');
            fallback.className = 'avatar-title rounded-circle fw-semibold bg-light';
            fallback.style.cssText = 'color:#495057;border:1.5px solid #ced4da;font-size:0.5rem' + (logoid ? ';display:none' : '');
            fallback.textContent = code.length > 3 ? code.substring(0, 3) : code;
            avatarContainer.appendChild(fallback);
            wrapper.appendChild(avatarContainer);
            var link = document.createElement('a');
            link.href = '/stock/detail/' + encodeURIComponent(code);
            link.className = 'fw-semibold text-primary fs-13';
            link.textContent = code;
            wrapper.appendChild(link);
            if (katilimSet[code]) {
                var badge = document.createElement('span');
                badge.className = 'badge bg-success bg-opacity-25 text-success ms-1';
                badge.style.cssText = 'font-size:0.6rem;padding:1px 3px';
                badge.title = 'Katılım Endeksi';
                badge.textContent = 'K';
                wrapper.appendChild(badge);
            }
            return wrapper;
        }

        function renderHaberChip() {
            var wrapper = document.createElement('div');
            wrapper.className = 'd-inline-flex align-items-center';
            var avatarContainer = document.createElement('div');
            avatarContainer.className = 'flex-shrink-0 avatar-xs me-1';
            var fallback = document.createElement('div');
            fallback.className = 'avatar-title rounded-circle fw-semibold';
            fallback.style.cssText = 'background:#e8f0fe;color:#405189;border:1.5px solid #c5d4f0;font-size:0.55rem';
            fallback.textContent = 'HB';
            avatarContainer.appendChild(fallback);
            wrapper.appendChild(avatarContainer);
            var label = document.createElement('span');
            label.className = 'text-muted fs-13';
            label.textContent = 'Haber';
            wrapper.appendChild(label);
            return wrapper;
        }

        function setText(id, val) {
            var el = document.getElementById(id);
            if (el) el.textContent = val;
        }

        // Katılım filtresi
        var marketFilterCb = document.getElementById('marketKatilimFilter');
        if (marketFilterCb) {
            marketFilterCb.addEventListener('change', function() {
                var active = this.checked;
                document.querySelectorAll('#tbody-future tr, #tbody-today tr, #tbody-past tr').forEach(function(tr) {
                    if (!active) { tr.style.display = ''; return; }
                    var hasKatilim = tr.querySelector('.badge.bg-success');
                    tr.style.display = hasKatilim ? '' : 'none';
                });
            });
        }

        // 60 saniyede bir otomatik yenile
        setInterval(function() { window.location.reload(); }, 60000);
    })();
    </script>
</th:block>
</body>

</html>
