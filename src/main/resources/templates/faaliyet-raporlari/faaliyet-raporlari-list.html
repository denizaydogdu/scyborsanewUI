<!doctype html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>
    <th:block layout:fragment="pagetitle">
        <div th:replace="~{partials/title-meta :: title-meta('Faaliyet Raporları')}"></div>
    </th:block>
</head>

<body>
<section layout:fragment="content">
    <div th:replace="~{partials/page-title :: page-title-3('Faaliyet Raporları', 'Haberler', '/kap-news')}"></div>

    <!-- Arama Kutusu -->
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-body">
                    <div class="d-flex align-items-center gap-2">
                        <div class="flex-grow-1 position-relative">
                            <label for="stockCodeInput" class="form-label fw-medium">Hisse Kodu</label>
                            <input type="text" id="stockCodeInput" class="form-control"
                                   placeholder="Hisse kodu girin (örn. GARAN)" maxlength="10"
                                   style="text-transform: uppercase;" autocomplete="off">
                            <!-- Autocomplete dropdown JS ile buraya eklenir -->
                        </div>
                        <div class="align-self-end">
                            <button type="button" id="searchBtn" class="btn btn-primary">
                                <i class="ri-search-line me-1"></i> Ara
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Loading Spinner -->
    <div class="row d-none" id="loadingArea">
        <div class="col-12">
            <div class="card">
                <div class="card-body text-center py-5">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Yükleniyor...</span>
                    </div>
                    <p class="mt-3 text-muted">Arama yapılıyor, lütfen bekleyin...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Hata Mesajı -->
    <div class="row d-none" id="errorArea">
        <div class="col-12">
            <div class="alert alert-danger d-flex align-items-center" role="alert">
                <i class="ri-error-warning-line me-2 fs-5"></i>
                <span id="errorMessage">Bir hata oluştu.</span>
            </div>
        </div>
    </div>

    <!-- Sonuç Kartları -->
    <div class="row d-none" id="resultsArea">
        <div class="col-12">
            <div class="card">
                <div class="card-header">
                    <h5 class="card-title mb-0">
                        Sonuçlar <span class="badge bg-primary ms-1" id="resultCount">0</span>
                    </h5>
                </div>
                <div class="card-body" id="resultsContainer">
                    <!-- JS ile doldurulacak -->
                </div>
            </div>
        </div>
    </div>

    <!-- Boş Sonuç -->
    <div class="row d-none" id="emptyArea">
        <div class="col-12">
            <div class="card">
                <div class="card-body text-center py-5">
                    <i class="ri-file-search-line fs-1 text-muted"></i>
                    <h5 class="mt-3 text-muted">Sonuç bulunamadı</h5>
                    <p class="text-muted">Girdiğiniz hisse kodu için faaliyet raporu bulunamadı.</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Detay Modal -->
    <div class="modal fade" id="detayModal" tabindex="-1" aria-labelledby="detayModalTitle" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-scrollable">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="detayModalTitle">Detay</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="text-center py-3 d-none" id="detayLoading">
                        <div class="spinner-border spinner-border-sm text-primary" role="status">
                            <span class="visually-hidden">Yükleniyor...</span>
                        </div>
                        <span class="ms-2 text-muted">İçerik yükleniyor...</span>
                    </div>
                    <div id="detayContent" style="white-space: pre-wrap;"></div>
                </div>
            </div>
        </div>
    </div>
</section>

<th:block layout:fragment="pagejs">
    <script th:src="@{/js/faaliyet-raporlari.js}"></script>
</th:block>
</body>

</html>
