<!doctype html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>
    <th:block layout:fragment="pagetitle">
        <div th:replace="~{partials/title-meta :: title-meta('Şirket Beklentileri')}"></div>
    </th:block>
</head>

<body>
<section layout:fragment="content">
    <div th:replace="~{partials/page-title :: page-title('Şirket Beklentileri', 'Temel Analiz')}"></div>

    <!-- KPI Kartlari -->
    <div class="row">
        <div class="col-xl-6 col-md-6">
            <div class="card card-animate">
                <div class="card-body">
                    <div class="d-flex align-items-center">
                        <div class="flex-grow-1">
                            <p class="text-uppercase fw-medium text-muted mb-0">Toplam Şirket</p>
                        </div>
                    </div>
                    <div class="d-flex align-items-end justify-content-between mt-3">
                        <div>
                            <h4 class="fs-22 fw-semibold mb-0" th:text="${toplamSirket}">0</h4>
                        </div>
                        <div class="avatar-sm flex-shrink-0">
                            <span class="avatar-title bg-light rounded fs-3">
                                <i class="ri-building-line text-primary"></i>
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-xl-6 col-md-6">
            <div class="card card-animate">
                <div class="card-body">
                    <div class="d-flex align-items-center">
                        <div class="flex-grow-1">
                            <p class="text-uppercase fw-medium text-muted mb-0">Mevcut Yıl Sayısı</p>
                        </div>
                    </div>
                    <div class="d-flex align-items-end justify-content-between mt-3">
                        <div>
                            <h4 class="fs-22 fw-semibold mb-0" th:text="${yillar != null ? #lists.size(yillar) : 0}">0</h4>
                        </div>
                        <div class="avatar-sm flex-shrink-0">
                            <span class="avatar-title bg-light rounded fs-3">
                                <i class="ri-calendar-line text-success"></i>
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Filtre + Tablo -->
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-header d-flex align-items-center gap-2">
                    <h5 class="card-title mb-0 flex-grow-1">Şirket Beklentileri</h5>
                    <div class="d-flex gap-2">
                        <input type="text" id="searchInput" class="form-control form-control-sm"
                               placeholder="Hisse kodu ara..." style="width: 160px;">
                        <select id="yearFilter" class="form-select form-select-sm" style="width: 120px;">
                            <option value="">Tüm Yıllar</option>
                            <option th:each="yil : ${yillar != null ? yillar : {}}" th:value="${yil}" th:text="${yil}">2024</option>
                        </select>
                    </div>
                </div>
                <div class="card-body">
                    <div id="tableContainer" th:if="${guidancelar != null and !#lists.isEmpty(guidancelar)}">
                        <div class="table-responsive">
                            <table class="table table-striped align-middle mb-0">
                                <thead>
                                <tr>
                                    <th style="width: 50px;">#</th>
                                    <th>Hisse Kodu</th>
                                    <th style="width: 80px;">Yıl</th>
                                    <th style="width: 100px;">İşlem</th>
                                </tr>
                                </thead>
                                <tbody id="guidanceTableBody">
                                <!-- JS ile doldurulacak -->
                                </tbody>
                            </table>
                        </div>
                        <!-- Sayfalama -->
                        <nav id="paginationNav" class="mt-3">
                            <ul class="pagination pagination-sm justify-content-center mb-0" id="paginationUl">
                            </ul>
                        </nav>
                    </div>

                    <!-- Bos durum -->
                    <div class="text-center py-5" id="emptyState"
                         th:if="${guidancelar == null or #lists.isEmpty(guidancelar)}">
                        <i class="ri-file-text-line fs-1 text-muted"></i>
                        <h5 class="mt-3 text-muted">Beklenti verisi bulunamadı</h5>
                        <p class="text-muted">Şu anda şirket beklentisi verisi bulunmamaktadır.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Beklenti Detay Modal -->
    <div class="modal fade" id="beklentiModal" tabindex="-1" aria-labelledby="beklentiModalTitle" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="beklentiModalTitle">Beklenti Detayı</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="beklentiModalBody"></div>
                </div>
            </div>
        </div>
    </div>
</section>

<th:block layout:fragment="pagejs">
    <script th:inline="javascript">
        window.guidanceData = /*[[${guidancelar}]]*/ [];
    </script>
    <script th:src="@{/js/guidance.js}"></script>
</th:block>
</body>

</html>
