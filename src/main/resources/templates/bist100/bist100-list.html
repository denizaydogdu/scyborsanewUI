<!doctype html>
<html lang="tr" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">

<head>
    <th:block layout:fragment="pagetitle">
        <div th:replace="~{partials/title-meta :: title-meta(${indexName})}"></div>
    </th:block>
</head>

<body>
<section layout:fragment="content">
    <div th:replace="~{partials/page-title :: page-title(${indexName}, 'Hisse Senetleri')}"></div>

    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-header d-flex align-items-center">
                    <h5 class="card-title mb-0 flex-grow-1" th:text="${indexName} + ' Endeksi'">BIST 100 Endeksi</h5>
                    <span class="badge bg-primary fs-12" th:text="${stockCount} + ' Hisse'"
                          th:if="${stockCount != null and stockCount > 0}">100 Hisse</span>
                </div>
                <div class="card-body">
                    <!-- Hisse Arama + Katılım Filtresi -->
                    <div class="mb-3 d-flex align-items-center gap-3 flex-wrap" th:if="${stocks != null and !#lists.isEmpty(stocks)}">
                        <div class="search-box flex-grow-1">
                            <input type="text" class="form-control" id="stockSearchInput"
                                   placeholder="Hisse kodu veya şirket adı ile ara..."
                                   autocomplete="off">
                            <i class="ri-search-line search-icon"></i>
                        </div>
                        <div class="form-check form-switch flex-shrink-0">
                            <input class="form-check-input" type="checkbox" id="katilimFilter">
                            <label class="form-check-label text-nowrap" for="katilimFilter">
                                <span class="badge bg-success bg-opacity-25 text-success" style="font-size: 0.7rem;">K</span>
                                Katılım Hisseleri
                            </label>
                        </div>
                    </div>
                    <div class="table-responsive" th:if="${stocks != null and !#lists.isEmpty(stocks)}">
                        <table class="table table-striped table-nowrap align-middle mb-0">
                            <thead>
                            <tr>
                                <th style="width: 50px;">#</th>
                                <th class="sortable" data-col="1" data-type="text" style="cursor:pointer;">Hisse <i class="ri-arrow-up-down-line text-muted fs-13"></i></th>
                                <th class="sortable" data-col="2" data-type="text" style="cursor:pointer;">Açıklama <i class="ri-arrow-up-down-line text-muted fs-13"></i></th>
                                <th class="sortable" data-col="3" data-type="num" style="width: 120px; cursor:pointer;">Fiyat <i class="ri-arrow-up-down-line text-muted fs-13"></i></th>
                                <th class="sortable" data-col="4" data-type="num" style="width: 120px; cursor:pointer;">Değişim % <i class="ri-arrow-up-down-line text-muted fs-13"></i></th>
                                <th class="sortable" data-col="5" data-type="num" style="width: 140px; cursor:pointer;">Hacim <i class="ri-arrow-up-down-line text-muted fs-13"></i></th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="stock, iterStat : ${stocks}">
                                <td th:text="${iterStat.count}">1</td>
                                <td>
                                    <div class="d-flex align-items-center">
                                        <div class="flex-shrink-0 avatar-xs me-2">
                                            <img th:if="${stock.logoid != null and !stock.logoid.isEmpty()}"
                                                 th:src="'/img/stock-logos/' + ${stock.logoid}"
                                                 th:alt="${stock.ticker}"
                                                 class="avatar-xs rounded-circle"
                                                 onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
                                            <div th:style="'background:transparent;color:#495057;border:1.5px solid #ced4da;font-size:0.55rem' + (${stock.logoid != null and !stock.logoid.isEmpty()} ? ';display:none' : '')"
                                                 class="avatar-title rounded-circle fw-semibold"
                                                 th:text="${stock.ticker != null ? (stock.ticker.length() > 4 ? stock.ticker.substring(0, 4) : stock.ticker) : '?'}">GARN</div>
                                        </div>
                                        <a th:href="@{/stock/detail/{id}(id=${stock.ticker})}"
                                           class="fw-semibold text-primary"
                                           th:text="${stock.ticker}">GARAN</a>
                                        <span th:if="${stock.katilim}" class="badge bg-success bg-opacity-25 text-success ms-1" style="font-size: 0.65rem; padding: 1px 4px;" title="Katılım Endeksi">K</span>
                                    </div>
                                </td>
                                <td th:text="${stock.description}">Garanti BBVA</td>
                                <td th:data-sort-value="${stock.price}">
                                    <span th:text="${#numbers.formatDecimal(stock.price, 1, 2)}">150.20</span>
                                    <small class="text-muted">TL</small>
                                </td>
                                <td th:data-sort-value="${stock.changePercent}">
                                    <span th:classappend="${stock.changePercent >= 0 ? 'text-success' : 'text-danger'}"
                                          th:text="${(stock.changePercent >= 0 ? '+' : '') + #numbers.formatDecimal(stock.changePercent, 1, 2) + '%'}">
                                        +2.35%
                                    </span>
                                </td>
                                <td th:data-sort-value="${stock.volume}">
                                    <span class="volume-cell" th:data-volume="${stock.volume}"
                                          th:text="${stock.volume}">1500000</span>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>

                    <!-- Bos durum -->
                    <div class="text-center py-5" th:unless="${stocks != null and !#lists.isEmpty(stocks)}">
                        <i class="ri-pie-chart-line fs-1 text-muted"></i>
                        <h5 class="mt-3 text-muted" th:text="${indexName} + ' verileri yüklenemedi'">BIST 100 verileri yüklenemedi</h5>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<th:block layout:fragment="pagejs">
    <script th:src="@{/js/market-hours.js}"></script>
    <script>
        // Hacim degerlerini K/M/B formatina donustur
        document.querySelectorAll('.volume-cell').forEach(function(cell) {
            var vol = parseFloat(cell.getAttribute('data-volume'));
            if (isNaN(vol)) return;
            if (vol >= 1e9) {
                cell.textContent = (vol / 1e9).toFixed(2) + ' Milyar';
            } else if (vol >= 1e6) {
                cell.textContent = (vol / 1e6).toFixed(2) + ' Milyon';
            } else if (vol >= 1e3) {
                cell.textContent = (vol / 1e3).toFixed(1) + ' Bin';
            }
        });

        // Kolon siralama
        (function() {
            var currentCol = null;
            var ascending = true;
            var table = document.querySelector('table.table');
            if (!table) return;
            var tbody = table.querySelector('tbody');
            var headers = table.querySelectorAll('th.sortable');

            headers.forEach(function(th) {
                th.addEventListener('click', function() {
                    var col = parseInt(th.getAttribute('data-col'));
                    var type = th.getAttribute('data-type');

                    if (currentCol === col) {
                        ascending = !ascending;
                    } else {
                        currentCol = col;
                        ascending = true;
                    }

                    // Ikon guncelle
                    headers.forEach(function(h) {
                        h.querySelector('i').className = 'ri-arrow-up-down-line text-muted fs-13';
                    });
                    th.querySelector('i').className = ascending
                        ? 'ri-arrow-up-s-fill text-primary fs-13'
                        : 'ri-arrow-down-s-fill text-primary fs-13';

                    var rows = Array.from(tbody.querySelectorAll('tr'));
                    rows.sort(function(a, b) {
                        var cellA = a.cells[col];
                        var cellB = b.cells[col];
                        var valA, valB;

                        if (type === 'num') {
                            valA = parseFloat(cellA.getAttribute('data-sort-value') || cellA.textContent) || 0;
                            valB = parseFloat(cellB.getAttribute('data-sort-value') || cellB.textContent) || 0;
                        } else {
                            valA = cellA.textContent.trim().toLocaleLowerCase('tr');
                            valB = cellB.textContent.trim().toLocaleLowerCase('tr');
                        }

                        if (valA < valB) return ascending ? -1 : 1;
                        if (valA > valB) return ascending ? 1 : -1;
                        return 0;
                    });

                    // DOM'a yerlestir + sira numarasi guncelle
                    rows.forEach(function(row, i) {
                        row.cells[0].textContent = i + 1;
                        tbody.appendChild(row);
                    });

                    // Sort sonrasi arama filtresini yeniden tetikle
                    var searchInput = document.getElementById('stockSearchInput');
                    if (searchInput && searchInput.value.trim()) {
                        searchInput.dispatchEvent(new Event('input'));
                    }
                });
            });
        })();

        // Hisse arama + katılım filtresi
        (function() {
            var searchInput = document.getElementById('stockSearchInput');
            var katilimCheckbox = document.getElementById('katilimFilter');
            if (!searchInput) return;
            var table = document.querySelector('table.table');
            if (!table) return;
            var tbody = table.querySelector('tbody');

            function filterRows() {
                var rows = Array.from(tbody.querySelectorAll('tr'));
                var query = searchInput.value.trim().toLocaleLowerCase('tr');
                var onlyKatilim = katilimCheckbox && katilimCheckbox.checked;
                var visibleIndex = 0;
                rows.forEach(function(row) {
                    var ticker = (row.cells[1] ? row.cells[1].textContent.trim().toLocaleLowerCase('tr') : '');
                    var desc = (row.cells[2] ? row.cells[2].textContent.trim().toLocaleLowerCase('tr') : '');
                    var hasKatilim = row.cells[1] ? row.cells[1].querySelector('.badge.bg-success') !== null : false;
                    var matchesSearch = !query || ticker.indexOf(query) > -1 || desc.indexOf(query) > -1;
                    var matchesKatilim = !onlyKatilim || hasKatilim;
                    if (matchesSearch && matchesKatilim) {
                        row.style.display = '';
                        visibleIndex++;
                        row.cells[0].textContent = visibleIndex;
                    } else {
                        row.style.display = 'none';
                    }
                });
            }

            searchInput.addEventListener('input', filterRows);
            if (katilimCheckbox) katilimCheckbox.addEventListener('change', filterRows);

            // sessionStorage ile state'i koru (auto-reload sonrası)
            var pageKey = window.location.pathname;
            var savedSearch = sessionStorage.getItem('bist-search-' + pageKey);
            var savedKatilim = sessionStorage.getItem('bist-katilim-' + pageKey);
            if (savedSearch) searchInput.value = savedSearch;
            if (savedKatilim === 'true' && katilimCheckbox) katilimCheckbox.checked = true;
            if (savedSearch || savedKatilim === 'true') filterRows();

            searchInput.addEventListener('input', function() {
                sessionStorage.setItem('bist-search-' + pageKey, this.value);
            });
            if (katilimCheckbox) {
                katilimCheckbox.addEventListener('change', function() {
                    sessionStorage.setItem('bist-katilim-' + pageKey, this.checked);
                });
            }
        })();

        // Seans durumuna gore adaptive sayfa yenileme
        (function() {
            var LIVE_INTERVAL = 60000;      // 60s (seans ici)
            var OFFHOURS_INTERVAL = 300000; // 5dk (seans disi)

            function getReloadInterval() {
                if (window.ScyborsaMarketHours) {
                    return window.ScyborsaMarketHours.isMarketOpen() ? LIVE_INTERVAL : OFFHOURS_INTERVAL;
                }
                return OFFHOURS_INTERVAL;
            }

            setTimeout(function() { window.location.reload(); }, getReloadInterval());
        })();
    </script>
</th:block>
</body>

</html>
